  const linha=c=>{const dd=diasAte(c.venc),atras=dd<0&&!c.pago;const st=c.pago?'':atras?`<span class="cstatus venc">Vencida ${Math.abs(dd)}d</span>`:dd===0?'<span class="cstatus hoje">Vence hoje</span>':`<span class="cstatus prox">em ${dd}d</span>`;
    return `<tr class="${atras?'row-venc':''}"><td>${esc(c.desc||c.cat||'(sem descrição)')}${c.desc&&c.cat?`<span class="row-desc">${esc(c.cat)}</span>`:''}</td><td style="white-space:nowrap">${fmtData(c.venc)} ${st}</td><td class="num-cell down">${BRL(c.valor)}</td><td style="width:78px;text-align:right;white-space:nowrap"><button class="icon-btn ok" data-vet-toggle="${c.id}" title="${c.pago?'Reabrir':'Marcar como paga'}">${c.pago?'↩':'✓'}</button><button class="icon-btn" data-vet-del-conta="${c.id}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button></td></tr>`;};
  const tab=(arr,vazio)=>`<table><thead><tr><th>Descrição</th><th>Vencimento</th><th style="text-align:right">Valor</th><th></th></tr></thead><tbody>${arr.length?arr.map(linha).join(''):`<tr><td colspan="4" class="empty">${vazio}</td></tr>`}</tbody></table>`;
  return `
  <div class="grid g4" style="margin:18px 0">
    <div class="kpi" style="background:var(--crit-bg);border:none"><div class="lbl" style="color:var(--critical)">Total a pagar</div><div class="val" style="font-size:24px;color:var(--critical)">${BRL(vetSum(pend))}</div><div class="sub">${pend.length} conta(s)</div></div>
    <div class="kpi"><div class="lbl">Vencidas</div><div class="val" style="font-size:24px">${pend.filter(c=>diasAte(c.venc)<0).length}</div></div>
    <div class="kpi"><div class="lbl">Vence hoje</div><div class="val" style="font-size:24px">${pend.filter(c=>diasAte(c.venc)===0).length}</div></div>
    <div class="kpi"><div class="lbl">Próximos 7 dias</div><div class="val" style="font-size:24px">${pend.filter(c=>{const d=diasAte(c.venc);return d>0&&d<=7;}).length}</div></div>
  </div>
  <div class="card" style="margin-bottom:18px"><div class="card-h"><h3>Nova conta a pagar</h3></div>
    <div class="form-row">
      <div class="field"><label>Descrição</label><input id="vc-desc" type="text" placeholder="Ex.: Fornecedor de vacinas"></div>
      <div class="field"><label>Categoria</label><input id="vc-cat" type="text" placeholder="Opcional"></div>
      <div class="field"><label>Valor R$</label><input id="vc-val" type="number" placeholder="0"></div>
      <div class="field"><label>Vencimento</label><input id="vc-venc" type="date" value="${todayISO()}"></div>
      <button class="btn" data-vet-add-conta>Adicionar</button></div></div>
  <div class="card" style="margin-bottom:18px"><div class="card-h"><h3>A pagar</h3><span class="tag">${BRL(vetSum(pend))}</span></div>${tab(pend,'Nenhuma conta pendente.')}</div>
  ${pagas.length?`<div class="card"><div class="card-h"><h3>Pagas</h3><span class="tag">${pagas.length}</span></div>${tab(pagas,'')}</div>`:''}`;
}
function vetAnalise(m){
  const k=vetMetrics(m), alvo=S.vet.config.margemAlvo;
  const segs=[{label:'Custo fixo',pct:k.custo?k.fixo/k.custo*100:0,color:'#1f5793',v:k.fixo},{label:'Custo variável',pct:k.custo?k.variavel/k.custo*100:0,color:'#b08a3e',v:k.variavel}];
  const mc=k.margem>=alvo?'exc':k.margem>=alvo*0.6?'boa':k.margem>=0?'aten':'crit';
  const custoMedio=k.n?k.custo/k.n:0;
  const precoSug=alvo<100? custoMedio/(1-alvo/100):0;
  return `
  <div class="grid g2" style="grid-template-columns:1fr 1fr;margin:18px 0">
    <div class="card"><div class="card-h"><h3>Margem de lucro · ${mLabel(m)}</h3><span class="tag">meta ${PCT(alvo,0)}</span></div>
      <div style="text-align:center;padding:10px 0"><div style="font-family:Fraunces;font-size:58px;line-height:1;color:${k.margem>=0?'var(--blue)':'var(--critical)'}">${PCT(k.margem,0)}</div>
        <div style="margin-top:10px"><span class="chip ${mc}">${k.margem>=alvo?'Meta atingida':'Abaixo da meta'}</span></div></div>
      <div class="bar" style="margin-top:8px;height:11px"><span style="width:${clamp(k.margem,0,100)}%"></span></div>
      <div class="form-row" style="margin-top:16px">
        <div class="field"><label>Meta de margem %</label><input type="number" id="vet-margem-alvo" value="${alvo}"></div>
        <button class="btn" data-vet-save-cfg>Salvar meta</button></div></div>
    <div class="card"><div class="card-h"><h3>Composição do custo</h3></div>
      ${k.custo?`<div class="donut-wrap"><div>${donut(segs,170,'CUSTO',BRL(k.custo))}</div><div class="legend">${segs.map(s=>`<div class="legend-row"><span class="sw" style="background:${s.color}"></span><span>${s.label}</span><span class="lp">${BRL(s.v)}</span></div>`).join('')}</div></div>`:'<div class="empty">Sem custos lançados.</div>'}
    </div>
  </div>
  <div class="grid g3" style="margin-bottom:18px">
    <div class="kpi"><div class="lbl">Ponto de equilíbrio</div><div class="val" style="font-size:24px">${k.breakeven?BRL(k.breakeven):'—'}</div><div class="sub">faturamento p/ cobrir custos</div></div>
    <div class="kpi"><div class="lbl">Custo médio / atendimento</div><div class="val" style="font-size:24px">${BRL(custoMedio)}</div><div class="sub">${k.n} atendimento(s)</div></div>
    <div class="kpi accent"><div class="lbl">Preço sugerido / atendimento</div><div class="val" style="font-size:24px">${precoSug?BRL(precoSug):'—'}</div><div class="sub">p/ margem de ${PCT(alvo,0)}</div></div>
  </div>
  <div class="card" style="margin-bottom:18px"><div class="card-h"><h3>Descontos concedidos · ${mLabel(m)}</h3><span class="tag">${k.descConc?PCT(k.descConc/(k.fat+k.descConc)*100,1)+' do bruto':''}</span></div>
    <div class="grid g3">
      <div class="kpi" style="background:var(--warn-bg);border:none"><div class="lbl" style="color:var(--warning)">Descontos concedidos</div><div class="val" style="font-size:24px;color:var(--warning)">${BRL(k.descConc)}</div><div class="sub">a clientes este mês</div></div>
      <div class="kpi"><div class="lbl">Descontos obtidos</div><div class="val" style="font-size:24px">${BRL(k.descObt)}</div><div class="sub">em compras / custos</div></div>
      <div class="kpi"><div class="lbl">Atendimentos com desconto</div><div class="val" style="font-size:24px">${k.rec.filter(r=>(+r.desconto||0)>0).length}</div><div class="sub">de ${k.n} no total</div></div>
    </div>
    ${k.rec.filter(r=>(+r.desconto||0)>0).length?`<table style="margin-top:14px"><thead><tr><th>Data</th><th>Serviço</th><th style="text-align:right">Bruto</th><th style="text-align:right">Desconto</th><th style="text-align:right">Líquido</th></tr></thead><tbody>${k.rec.filter(r=>(+r.desconto||0)>0).sort((a,b)=>b.data.localeCompare(a.data)).map(r=>{const it=r.itemId?vetItem(r.itemId):null;return `<tr><td style="white-space:nowrap">${fmtData(r.data)}</td><td>${esc(it?it.nome:(r.cat||'Avulso'))}</td><td class="num-cell">${BRL(r.valor)}</td><td class="num-cell down">${BRL(r.desconto)}</td><td class="num-cell up">${BRL(recLiq(r))}</td></tr>`;}).join('')}</tbody></table>`:''}
  </div>
  ${(()=>{ const porPag={}; k.rec.forEach(r=>{const p=r.pagamento||'Não informado'; porPag[p]=(porPag[p]||0)+recLiq(r);});
    const ent=Object.entries(porPag).sort((a,b)=>b[1]-a[1]);
    return `<div class="card" style="margin-bottom:18px"><div class="card-h"><h3>Recebido por forma de pagamento · ${mLabel(m)}</h3><span class="tag">${BRL(k.fat)}</span></div>
      ${ent.length?hbars(ent.map(([l,v],i)=>({l,v,c:`linear-gradient(90deg,${PAL[i%PAL.length]},var(--gold))`}))):'<div class="empty">Nenhum atendimento neste mês.</div>'}</div>`; })()}
  <div class="card" style="margin-bottom:18px"><div class="card-h"><h3>Formas de pagamento</h3><span class="tag">configuráveis</span></div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
      ${(S.vet.config.formasPagamento||[]).map(fp=>`<span class="chip boa" style="padding:6px 12px;gap:8px">${esc(fp)} <button class="icon-btn" data-vet-del-pag="${esc(fp)}" title="Remover" style="width:18px;height:18px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 6l12 12M18 6L6 18"/></svg></button></span>`).join('')||'<span style="color:var(--muted);font-size:13px">Nenhuma forma cadastrada.</span>'}
    </div>
    <div class="form-row">
      <div class="field"><label>Nova forma de pagamento</label><input type="text" id="vet-pag-novo" placeholder="Ex.: Boleto, Cheque..."></div>
      <button class="btn" data-vet-add-pag>Adicionar</button></div></div>
  <div class="card"><div class="card-h"><h3>Evolução do lucro mensal</h3></div>${vetLucroLine()}</div>
  <div class="disclaimer" style="margin-top:14px">Indicadores calculados sobre os lançamentos da veterinária. O preço sugerido é uma referência de markup sobre o custo médio por atendimento — ajuste conforme o mercado e o valor percebido pelo cliente.</div>`;
}
function vetLucroLine(){
  const ms=vetMeses().slice(-6);
  if(ms.length<2) return '<div class="empty">Lance ao menos dois meses para ver a evolução do lucro.</div>';
  const vals=ms.map(m=>vetSum(vetRecMes(m))-vetSum(vetDespMes(m)));
  return line(vals)+`<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px">${ms.map(m=>`<span>${mLabel(m)}</span>`).join('')}</div>`;
}

/* ============================ FORM / SELECT HELPERS ============================ */
function addForm(tipo,who,cats){
  return `<div class="form-row" style="margin-top:14px">
    <div class="field"><label>Categoria</label><select data-cat="${tipo}-${who}">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <div class="field"><label>Descrição</label><input type="text" data-desc="${tipo}-${who}" placeholder="Sobre o que foi (opcional)"></div>
    <div class="field"><label>Valor R$</label><input type="number" data-val="${tipo}-${who}" placeholder="0"></div>
    <button class="btn sm" data-add="${tipo}|${who}">Lançar</button></div>`;
}
function monthSelector(){
  const cur=curMonth();
  let ms=months(); if(!ms.includes(cur)) ms=[...ms,cur].sort();
  return `<span class="inline-month-nav"><button class="mnav-arrow sm" data-month-shift="-1" aria-label="Mês anterior" title="Mês anterior">‹</button><span class="seg" id="monthSeg">${ms.map(m=>`<button class="${m===cur?'active':''}" data-month="${m}">${mLabel(m)}</button>`).join('')}</span><button class="mnav-arrow sm" data-month-shift="1" aria-label="Próximo mês" title="Próximo mês">›</button></span>`;
}
function renderMonthNav(){
  const cur=curMonth(), nav=$('#monthNav'); if(!nav)return;
  nav.innerHTML=`<button class="mnav-arrow" data-gmonth="-1" aria-label="Mês anterior" title="Mês anterior">‹</button><span class="mnav-label">${mLabel(cur)}</span><button class="mnav-arrow" data-gmonth="1" aria-label="Próximo mês" title="Próximo mês">›</button>`;
  nav.querySelectorAll('[data-gmonth]').forEach(b=>b.onclick=()=>{S.config.mesAtual=shiftMonth(curMonth(),+b.dataset.gmonth);save();render();});
}

/* ============================ EVENTS ============================ */
function attachViewEvents(){
  const c=$('#content');
  c.querySelectorAll('[data-month]').forEach(b=>b.onclick=()=>{S.config.mesAtual=b.dataset.month;save();render();});
  c.querySelectorAll('[data-month-shift]').forEach(b=>b.onclick=()=>{S.config.mesAtual=shiftMonth(curMonth(),+b.dataset.monthShift);save();render();});
  c.querySelectorAll('[data-rateio]').forEach(b=>b.onclick=()=>{S.config.rateio=b.dataset.rateio;save();render();});
  c.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{
    const [tipo,who]=b.dataset.add.split('|');
    const cat=c.querySelector(`[data-cat="${tipo}-${who}"]`).value;
    const descEl=c.querySelector(`[data-desc="${tipo}-${who}"]`);
    const desc=descEl?descEl.value.trim():'';
    const val=+c.querySelector(`[data-val="${tipo}-${who}"]`).value;
    if(!val)return; const m=curMonth();
    if(tipo==='rec') S.receitas.push({id:uid(),mes:m,pessoa:who,cat,desc,valor:val});
    else S.despesas.push({id:uid(),mes:m,dono:who,cat,desc,valor:val});
    save();render();
  });
  c.querySelectorAll('[data-del-rec]').forEach(b=>b.onclick=()=>{S.receitas=S.receitas.filter(x=>x.id!==b.dataset.delRec);save();render();});
  c.querySelectorAll('[data-del-desp]').forEach(b=>b.onclick=()=>{S.despesas=S.despesas.filter(x=>x.id!==b.dataset.delDesp);save();render();});
  const ac=c.querySelector('[data-add-conta]'); if(ac)ac.onclick=()=>{
    const tipo=c.querySelector('#ct-tipo').value, desc=c.querySelector('#ct-desc').value.trim(),
      cat=c.querySelector('#ct-cat').value.trim(), val=+c.querySelector('#ct-val').value, venc=c.querySelector('#ct-venc').value;
    if(!val||!venc){alert('Informe ao menos valor e vencimento.');return;}
    if(!desc&&!cat){alert('Informe uma descrição para a conta.');return;}
    S.contas.push({id:uid(),tipo,desc,cat,valor:val,venc,pago:false}); save(); render();};
  c.querySelectorAll('[data-toggle-conta]').forEach(b=>b.onclick=()=>{const ct=S.contas.find(x=>x.id===b.dataset.toggleConta); if(ct){ct.pago=!ct.pago;save();render();}});
  c.querySelectorAll('[data-del-conta]').forEach(b=>b.onclick=()=>{if(confirm('Excluir esta conta?')){S.contas=S.contas.filter(x=>x.id!==b.dataset.delConta);save();render();}});
  const pl=c.querySelector('[data-pedir-lembrete]'); if(pl)pl.onclick=pedirLembrete;
  const gc=c.querySelector('[data-go-contas]'); if(gc)gc.onclick=()=>go('contas');
  const ss=c.querySelector('[data-save-saldo]'); if(ss)ss.onclick=()=>{c.querySelectorAll('[data-saldo]').forEach(i=>S.saldos[i.dataset.saldo]=+i.value||0);save();render();};
  // ----- VETERINÁRIA -----
  const vl=c.querySelector('[data-vet-login]'); if(vl)vl.onclick=()=>{
    const p1=c.querySelector('#vet-pin1').value, err=c.querySelector('#vet-err');
    if(!S.vet.pin){ const p2=c.querySelector('#vet-pin2').value;
      if(p1.length<4){err.textContent='Use ao menos 4 caracteres.';return;}
      if(p1!==p2){err.textContent='As senhas não conferem.';return;}
      S.vet.pin=vetHash(p1); save(); vetAuth=true; vetTab='painel'; render();
    } else { if(vetHash(p1)===S.vet.pin){ vetAuth=true; vetTab='painel'; render(); } else err.textContent='Senha incorreta.'; }
  };
  const vk=c.querySelector('#vet-pin1'); if(vk)vk.onkeydown=e=>{ if(e.key==='Enter') c.querySelector('[data-vet-login]').click(); };
  const vrst=c.querySelector('[data-vet-reset]'); if(vrst)vrst.onclick=()=>{ if(confirm('Isso vai APAGAR todos os dados da veterinária e remover a senha. Continuar?')){ S.vet=seedVet(); save(); render(); } };
  const vlk=c.querySelector('[data-vet-lock]'); if(vlk)vlk.onclick=()=>{ vetAuth=false; render(); };
  c.querySelectorAll('[data-vet-tab]').forEach(b=>b.onclick=()=>{ vetTab=b.dataset.vetTab; vetEditItem=null; render(); });
  // cálculo ao vivo: valor unitário × quantidade = total do item
  const calcLine=()=>{ const sel=c.querySelector('#vr-item'); if(!sel)return; const op=sel.selectedOptions[0];
    const vEl=c.querySelector('#vr-val'); let unit=+vEl.value; if(!vEl.value && op && op.value) unit=+op.dataset.preco||0;
    const qtd=Math.max(1,Math.round(+c.querySelector('#vr-qtd').value||1));
    const lbl=c.querySelector('#vr-linetotal'); if(lbl) lbl.innerHTML=`Unitário <b>${BRL(unit)}</b> × ${qtd} = <b>${BRL(unit*qtd)}</b>`;
    const inp=c.querySelector('#vr-linetotal-in'); if(inp) inp.value=BRL(unit*qtd);
  };
  const vrItem=c.querySelector('#vr-item'); if(vrItem)vrItem.onchange=()=>{ const op=vrItem.selectedOptions[0]; const vv=c.querySelector('#vr-val'); if(op&&op.value&&vv&&!vv.value) vv.value=op.dataset.preco||''; calcLine(); };
  const vrQtd=c.querySelector('#vr-qtd'); if(vrQtd)vrQtd.oninput=calcLine;
  const vrVal=c.querySelector('#vr-val'); if(vrVal)vrVal.oninput=calcLine;
  if(c.querySelector('#vr-linetotal')) calcLine();
  const vCartAdd=c.querySelector('[data-vet-cart-add]'); if(vCartAdd)vCartAdd.onclick=()=>{
    persistCart();
    const itemId=c.querySelector('#vr-item').value, qtd=Math.max(1,Math.round(+c.querySelector('#vr-qtd').value||1));
    let valUnit=+c.querySelector('#vr-val').value, nome='Avulso', custoUnit=0, tipo='servico', mats=[];
    if(itemId){ const it=vetItem(itemId); if(it){ nome=it.nome; tipo=it.tipo||'servico'; custoUnit=vetItemCusto(it); mats=(it.materiais||[]).map(mm=>({estoqueId:mm.estoqueId,qtd:+mm.qtd||0})); if(!valUnit) valUnit=+it.preco||0; } }
    if(!valUnit){alert('Informe o valor unitário (ou escolha um item do catálogo com preço).');return;}
    vetCart.itens.push({itemId,nome,tipo,qtd,valorUnit:valUnit,custoUnit,mats}); render(); };
  c.querySelectorAll('[data-vet-cart-del]').forEach(b=>b.onclick=()=>{ persistCart(); vetCart.itens.splice(+b.dataset.vetCartDel,1); render(); });
  const vCartClear=c.querySelector('[data-vet-cart-clear]'); if(vCartClear)vCartClear.onclick=()=>{ vetCart={data:todayISO(),tutor:'',desc:'',desconto:0,pagamento:'',itens:[]}; render(); };
  const vFinal=c.querySelector('[data-vet-finalizar]'); if(vFinal)vFinal.onclick=()=>{
    persistCart();
    if(!vetCart.itens.length){alert('Adicione ao menos um item ao atendimento.');return;}
    if(!vetCart.data){alert('Informe a data do atendimento.');return;}
    const valor=vetCart.itens.reduce((a,i)=>a+i.valorUnit*i.qtd,0), custo=vetCart.itens.reduce((a,i)=>a+i.custoUnit*i.qtd,0);
    const agg={}; vetCart.itens.forEach(i=>(i.mats||[]).forEach(mm=>{ agg[mm.estoqueId]=(agg[mm.estoqueId]||0)+mm.qtd*i.qtd; }));
    const materiais=Object.entries(agg).map(([estoqueId,qtd])=>({estoqueId,qtd}));
    materiais.forEach(mm=>{ const e=vetMat(mm.estoqueId); if(e) e.qtd=(+e.qtd||0)-mm.qtd; });
    const itens=vetCart.itens.map(i=>({itemId:i.itemId,nome:i.nome,tipo:i.tipo||'servico',qtd:i.qtd,valorUnit:i.valorUnit,custoUnit:i.custoUnit}));
    S.vet.receitas.push({id:uid(),data:vetCart.data,tutor:(vetCart.tutor||'').trim(),desc:(vetCart.desc||'').trim(),pagamento:vetCart.pagamento||'',desconto:+vetCart.desconto||0,valor,custo,itens,materiais});
    vetCart={data:todayISO(),tutor:'',desc:'',desconto:0,pagamento:'',itens:[]}; save(); render(); };
  c.querySelectorAll('[data-vet-del-rec]').forEach(b=>b.onclick=()=>{ const r=S.vet.receitas.find(x=>x.id===b.dataset.vetDelRec);
    if(r&&r.materiais) r.materiais.forEach(mm=>{ const e=vetMat(mm.estoqueId); if(e) e.qtd=(+e.qtd||0)+(+mm.qtd||0); });
    S.vet.receitas=S.vet.receitas.filter(x=>x.id!==b.dataset.vetDelRec); save(); render(); });
  const vAddD=c.querySelector('[data-vet-add-desp]'); if(vAddD)vAddD.onclick=()=>{
    const data=c.querySelector('#vd-data').value, cat=c.querySelector('#vd-cat').value, tipo=c.querySelector('#vd-tipo').value,
      desc=c.querySelector('#vd-desc').value.trim(), val=+c.querySelector('#vd-val').value, desconto=+c.querySelector('#vd-desc-val').value||0;
    if(!val||!data){alert('Informe data e valor.');return;} S.vet.despesas.push({id:uid(),data,cat,tipo,desc,valor:val,desconto}); save(); render(); };
  c.querySelectorAll('[data-vet-del-desp]').forEach(b=>b.onclick=()=>{S.vet.despesas=S.vet.despesas.filter(x=>x.id!==b.dataset.vetDelDesp);save();render();});
  // catálogo
  const vAddI=c.querySelector('[data-vet-add-item]'); if(vAddI)vAddI.onclick=()=>{
    const tipo=c.querySelector('#vi-tipo').value, nome=c.querySelector('#vi-nome').value.trim(), descricao=c.querySelector('#vi-desc').value.trim(),
      custoManual=+c.querySelector('#vi-custo').value||0, preco=+c.querySelector('#vi-preco').value||0;
    if(!nome){alert('Informe o nome do produto/serviço.');return;}
    S.vet.catalogo.push({id:uid(),tipo,nome,descricao,custoManual,preco,materiais:[]}); save(); render(); };
  c.querySelectorAll('[data-vet-del-item]').forEach(b=>b.onclick=()=>{if(confirm('Excluir este item do catálogo?')){S.vet.catalogo=S.vet.catalogo.filter(x=>x.id!==b.dataset.vetDelItem);if(vetEditItem===b.dataset.vetDelItem)vetEditItem=null;save();render();}});
  c.querySelectorAll('[data-vet-edit-item]').forEach(b=>b.onclick=()=>{ vetEditItem=b.dataset.vetEditItem; render(); });
  const vCancelE=c.querySelector('[data-vet-cancel-edit]'); if(vCancelE)vCancelE.onclick=()=>{ vetEditItem=null; render(); };
  const vSaveI=c.querySelector('[data-vet-save-item]'); if(vSaveI)vSaveI.onclick=()=>{ const it=vetItem(vSaveI.dataset.vetSaveItem);
    if(it){ const nome=c.querySelector('#vie-nome').value.trim(); if(!nome){alert('Informe o nome.');return;}
      it.tipo=c.querySelector('#vie-tipo').value; it.nome=nome; it.descricao=c.querySelector('#vie-desc').value.trim();
      it.custoManual=+c.querySelector('#vie-custo').value||0; it.preco=+c.querySelector('#vie-preco').value||0; }
    vetEditItem=null; save(); render(); };
  c.querySelectorAll('[data-vet-add-mat]').forEach(b=>b.onclick=()=>{ const id=b.dataset.vetAddMat, it=vetItem(id);
    const estoqueId=c.querySelector(`[data-vet-mat-sel="${id}"]`).value, qtd=+c.querySelector(`[data-vet-mat-qtd="${id}"]`).value||0;
    if(!estoqueId||!qtd){alert('Selecione o material e a quantidade.');return;}
    if(!it.materiais)it.materiais=[]; const ex=it.materiais.find(mm=>mm.estoqueId===estoqueId); if(ex)ex.qtd=+ex.qtd+qtd; else it.materiais.push({estoqueId,qtd}); save(); render(); });
  c.querySelectorAll('[data-vet-del-mat]').forEach(b=>b.onclick=()=>{ const [id,eid]=b.dataset.vetDelMat.split('|'); const it=vetItem(id); if(it)it.materiais=(it.materiais||[]).filter(mm=>mm.estoqueId!==eid); save(); render(); });
  // estoque
  const vAddE=c.querySelector('[data-vet-add-est]'); if(vAddE)vAddE.onclick=()=>{
    const nome=c.querySelector('#ve-nome').value.trim(), tipo=c.querySelector('#ve-tipo').value, unidade=c.querySelector('#ve-un').value.trim()||'un',
      custoUnit=+c.querySelector('#ve-custo').value||0, qtd=+c.querySelector('#ve-qtd').value||0, qtdMin=+c.querySelector('#ve-min').value||0;
    if(!nome){alert('Informe o nome do material.');return;}
    S.vet.estoque.push({id:uid(),nome,tipo,unidade,custoUnit,qtd,qtdMin}); save(); render(); };
  c.querySelectorAll('[data-vet-repor]').forEach(b=>b.onclick=()=>{ const e=vetMat(b.dataset.vetRepor); const q=+c.querySelector(`[data-vet-rep-qtd="${b.dataset.vetRepor}"]`).value||0; if(e&&q){e.qtd=(+e.qtd||0)+q;save();render();} });
  c.querySelectorAll('[data-vet-del-mat-est]').forEach(b=>b.onclick=()=>{if(confirm('Excluir este material do estoque?')){S.vet.estoque=S.vet.estoque.filter(x=>x.id!==b.dataset.vetDelMatEst);save();render();}});
  const vAddC=c.querySelector('[data-vet-add-conta]'); if(vAddC)vAddC.onclick=()=>{
    const desc=c.querySelector('#vc-desc').value.trim(), cat=c.querySelector('#vc-cat').value.trim(), val=+c.querySelector('#vc-val').value, venc=c.querySelector('#vc-venc').value;
    if(!val||!venc){alert('Informe valor e vencimento.');return;} if(!desc&&!cat){alert('Informe uma descrição.');return;}
    S.vet.contas.push({id:uid(),tipo:'pagar',desc,cat,valor:val,venc,pago:false}); save(); render(); };
  c.querySelectorAll('[data-vet-toggle]').forEach(b=>b.onclick=()=>{const ct=S.vet.contas.find(x=>x.id===b.dataset.vetToggle);if(ct){ct.pago=!ct.pago;save();render();}});
  c.querySelectorAll('[data-vet-del-conta]').forEach(b=>b.onclick=()=>{if(confirm('Excluir esta conta?')){S.vet.contas=S.vet.contas.filter(x=>x.id!==b.dataset.vetDelConta);save();render();}});
  const vCfg=c.querySelector('[data-vet-save-cfg]'); if(vCfg)vCfg.onclick=()=>{S.vet.config.margemAlvo=+c.querySelector('#vet-margem-alvo').value||0;save();render();};
  c.querySelectorAll('[data-vet-cat-filtro]').forEach(b=>b.onclick=()=>{ vetCatFiltro=b.dataset.vetCatFiltro; render(); });
  const vAddPag=c.querySelector('[data-vet-add-pag]'); if(vAddPag)vAddPag.onclick=()=>{ const v=c.querySelector('#vet-pag-novo').value.trim();
    if(!v){alert('Informe a forma de pagamento.');return;} if(!S.vet.config.formasPagamento)S.vet.config.formasPagamento=[];
    if(S.vet.config.formasPagamento.some(x=>x.toLowerCase()===v.toLowerCase())){alert('Essa forma já existe.');return;}
    S.vet.config.formasPagamento.push(v); save(); render(); };
  c.querySelectorAll('[data-vet-del-pag]').forEach(b=>b.onclick=()=>{ S.vet.config.formasPagamento=(S.vet.config.formasPagamento||[]).filter(x=>x!==b.dataset.vetDelPag); save(); render(); });
  c.querySelectorAll('[data-del-meta]').forEach(b=>b.onclick=()=>{S.metas=S.metas.filter(x=>x.id!==b.dataset.delMeta);save();render();});
  c.querySelectorAll('[data-add-meta]').forEach(b=>b.onclick=()=>{const k=b.dataset.addMeta;
    const nome=c.querySelector('#mn-'+k).value,alvo=+c.querySelector('#ma-'+k).value,atual=+c.querySelector('#mc-'+k).value||0;
    if(!nome||!alvo)return; S.metas.push({id:uid(),nome,prazo:k,alvo,atual});save();render();});
  c.querySelectorAll('[data-del-viagem]').forEach(b=>b.onclick=()=>{S.viagens=S.viagens.filter(x=>x.id!==b.dataset.delViagem);save();render();});
  const av=c.querySelector('[data-add-viagem]'); if(av)av.onclick=()=>{
    const d=c.querySelector('#vg-d').value,v=+c.querySelector('#vg-v').value,m=+c.querySelector('#vg-m').value,g=+c.querySelector('#vg-g').value||0;
    if(!d||!v||!m)return; S.viagens.push({id:uid(),destino:d,valor:v,meses:m,guardado:g});save();render();};
  const sc=c.querySelector('[data-save-conta]'); if(sc)sc.onclick=()=>{
    S.patrimonio.investido=+c.querySelector('#inv-in').value||0;
    S.patrimonio.conta=+c.querySelector('#conta-in').value||0;
    S.patrimonio.dividas=+c.querySelector('#div-in').value||0;
    save();render();};
  const sq=c.querySelector('[data-save-qual]'); if(sq)sq.onclick=()=>{c.querySelectorAll('[data-qual]').forEach(i=>S.qualidade[i.dataset.qual]=+i.value||0);save();render();};
  c.querySelectorAll('[data-cen]').forEach(b=>b.onclick=()=>{cenario=b.dataset.cen;render();});
  const ti=c.querySelector('#taxa-in'); if(ti)ti.onchange=()=>{S.invest.taxaAnual=+ti.value||0;save();render();};
  const ti2=c.querySelector('#taxa-in2'); if(ti2)ti2.onchange=()=>{S.invest.taxaAnual=+ti2.value||0;save();render();};
  const dyi=c.querySelector('#dy-in'); if(dyi)dyi.onchange=()=>{S.invest.dyMedio=+dyi.value||0;save();render();};
  const sa=c.querySelector('[data-save-aloc]'); if(sa)sa.onclick=()=>{c.querySelectorAll('[data-aloc]').forEach(i=>S.invest.alocacao[i.dataset.aloc]=+i.value||0);save();render();};
  // alocação soma indicador
  const sum=c.querySelector('#aloc-sum');
  if(sum){const upd=()=>{let t=0;c.querySelectorAll('[data-aloc]').forEach(i=>t+=+i.value||0);sum.textContent='Soma: '+t+'%';sum.style.color=t===100?'var(--positive)':'var(--critical)';};
    upd();c.querySelectorAll('[data-aloc]').forEach(i=>i.oninput=upd);}
}

/* ============================ ATALHO RÁPIDO (MODAL) ============================ */
let quickState=null;
function openQuick(tipo){
  quickState={tipo,who:tipo==='rec'?'rodrigo':'casal',cat:null,desc:'',valor:'',mes:curMonth()};
  renderQuick();
  $('#modalScrim').classList.add('show'); $('#quickModal').classList.add('show');
  setTimeout(()=>{const v=$('#quickModal').querySelector('[data-qval]'); if(v)v.focus();},60);
}
function closeQuick(){ $('#modalScrim').classList.remove('show'); $('#quickModal').classList.remove('show'); quickState=null; }
function persistQuick(){ const M=$('#quickModal'),q=quickState; if(!q)return; const g=s=>M.querySelector(s);
  if(g('[data-qcat]'))q.cat=g('[data-qcat]').value;
  if(g('[data-qdesc]'))q.desc=g('[data-qdesc]').value;
  if(g('[data-qval]'))q.valor=g('[data-qval]').value;
  if(g('[data-qmes]'))q.mes=g('[data-qmes]').value;
}
function renderQuick(){
  const q=quickState; if(!q)return;
  const whoOpts=q.tipo==='rec'?[['rodrigo','Rodrigo'],['esther','Esther']]:[['rodrigo','Rodrigo'],['esther','Esther'],['casal','Casal']];
  if(!whoOpts.some(([k])=>k===q.who)) q.who=whoOpts[0][0];
  const cats=CATS[q.tipo][q.who]||[];
  if(!cats.includes(q.cat)) q.cat=cats[0];
  const M=$('#quickModal');
  M.innerHTML=`
    <div class="modal-head"><h3>Lançamento rápido</h3><button class="modal-x" data-qclose aria-label="Fechar">✕</button></div>
    <div class="qseg">${[['rec','Receita'],['desp','Despesa']].map(([k,l])=>`<button class="${q.tipo===k?'active':''}" data-qtipo="${k}">${l}</button>`).join('')}</div>
    <div class="field" style="margin-bottom:12px"><label>${q.tipo==='rec'?'Pessoa':'De quem'}</label>
      <div class="qseg sub">${whoOpts.map(([k,l])=>`<button class="${q.who===k?'active':''}" data-qwho="${k}">${l}</button>`).join('')}</div></div>
    <div class="field" style="margin-bottom:12px"><label>Categoria</label><select data-qcat>${cats.map(c=>`<option ${c===q.cat?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="field" style="margin-bottom:12px"><label>Descrição</label><input type="text" data-qdesc value="${esc(q.desc)}" placeholder="Sobre o que foi esse lançamento?"></div>
    <div class="form-row" style="grid-template-columns:1fr 1fr">
      <div class="field"><label>Valor R$</label><input type="number" data-qval value="${esc(q.valor)}" placeholder="0"></div>
      <div class="field"><label>Mês</label><input type="month" data-qmes value="${q.mes}"></div>
    </div>
    <div class="modal-foot"><button class="btn ghost" data-qclose>Cancelar</button><button class="btn" data-qsave>Lançar ${q.tipo==='rec'?'receita':'despesa'}</button></div>`;
  M.querySelectorAll('[data-qtipo]').forEach(b=>b.onclick=()=>{persistQuick();quickState.tipo=b.dataset.qtipo;renderQuick();});
  M.querySelectorAll('[data-qwho]').forEach(b=>b.onclick=()=>{persistQuick();quickState.who=b.dataset.qwho;renderQuick();});
  M.querySelectorAll('[data-qclose]').forEach(b=>b.onclick=closeQuick);
  M.querySelector('[data-qsave]').onclick=saveQuick;
}
function saveQuick(){
  persistQuick(); const q=quickState; const val=+q.valor;
  if(!val){alert('Informe um valor maior que zero.');return;}
  const mes=q.mes||curMonth(), desc=(q.desc||'').trim();
  if(q.tipo==='rec') S.receitas.push({id:uid(),mes,pessoa:q.who,cat:q.cat,desc,valor:val});
  else S.despesas.push({id:uid(),mes,dono:q.who,cat:q.cat,desc,valor:val});
  S.config.mesAtual=mes; save(); closeQuick(); render();
}

$('#menuToggle').onclick=()=>{$('#sidebar').classList.toggle('open');$('#scrim').classList.toggle('show');};
$('#fabMain').onclick=()=>$('#fabWrap').classList.toggle('open');
$('#fabActions').addEventListener('click',e=>{const b=e.target.closest('[data-quick]'); if(b){$('#fabWrap').classList.remove('open');openQuick(b.dataset.quick);}});
$('#modalScrim').onclick=closeQuick;
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeQuick();$('#fabWrap').classList.remove('open');}});
$('#scrim').onclick=()=>{$('#sidebar').classList.remove('open');$('#scrim').classList.remove('show');};
$('#resetBtn').onclick=reset;
$('#themeBtn').onclick=()=>{ S.config.theme = S.config.theme==='dark'?'light':'dark'; save(); applyTheme(); };
$('#backupBtn').onclick=exportBackup;
$('#importBtn').onclick=()=>$('#importFile').click();
$('#importFile').onchange=e=>{ if(e.target.files&&e.target.files[0]) importBackup(e.target.files[0]); e.target.value=''; };
$('#nav').addEventListener('click',e=>{const b=e.target.closest('[data-go]');if(b)go(b.dataset.go);});
applyTheme();
go('diag');
dispararLembretes(false);
</script>
