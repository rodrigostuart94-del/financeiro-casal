<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manual Financeiro · Rodrigo & Esther</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef1f7;
  --bg2:#e4eaf3;
  --surface:#fbfcfe;
  --surface2:#f1f4fa;
  --ink:#16202e;
  --ink-soft:#46536a;
  --muted:#8893a3;
  --line:#dce3ee;
  --line-soft:#e8edf5;
  --blue:#1f5793;
  --blue-d:#143d6b;
  --gold:#b08a3e;
  --gold-soft:#cdb074;
  --positive:#2f7a52;
  --warning:#bd812a;
  --critical:#b14536;
  --crit-bg:#f7e7e2;
  --warn-bg:#f7eed8;
  --pos-bg:#e3efe6;
  --shadow:0 1px 2px rgba(20,40,70,.05),0 8px 28px -12px rgba(20,40,70,.20);
  --shadow-lg:0 30px 70px -30px rgba(20,61,107,.35);
  --topbar-bg:rgba(241,237,228,.82);
  --r:18px;
  --r-sm:12px;
}
[data-theme="dark"]{
  --bg:#0e131a; --bg2:#121a23; --surface:#19212c; --surface2:#222c39;
  --ink:#e8edf4; --ink-soft:#aebac9; --muted:#7c8a9c;
  --line:#2b3644; --line-soft:#232e3b;
  --blue:#4a8fd6; --blue-d:#2c5e96; --gold:#c39a4e; --gold-soft:#d8bd83;
  --positive:#46b07e; --warning:#d49a3e; --critical:#d96553;
  --crit-bg:#3a241f; --warn-bg:#332a18; --pos-bg:#1d3328;
  --topbar-bg:rgba(16,21,28,.85);
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 28px -12px rgba(0,0,0,.6);
  --shadow-lg:0 30px 70px -30px rgba(0,0,0,.7);
}
[data-theme="dark"] .perfil-switch button.active{background:var(--surface2);color:var(--ink)}
[data-theme="dark"] .qseg button.active{background:var(--surface2);color:var(--ink)}
[data-theme="dark"] .chip.boa,[data-theme="dark"] .cstatus.prox{background:#1d2b3c;color:#7fb0e6}
[data-theme="dark"] tr.row-venc td{background:rgba(217,101,83,.10)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(1200px 600px at 100% -10%,rgba(176,138,62,.10),transparent 55%),
    radial-gradient(900px 700px at -10% 110%,rgba(31,87,147,.12),transparent 50%),
    var(--bg);
  color:var(--ink);
  font-family:"Manrope",sans-serif;
  font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,h4{font-family:"Fraunces",serif;font-weight:500;line-height:1.12;letter-spacing:-.01em}
.serif{font-family:"Fraunces",serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:14px}

/* ---------- LAYOUT ---------- */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{
  position:sticky;top:0;height:100vh;
  background:linear-gradient(180deg,var(--blue),var(--blue-d));
  color:#e9ecdf;padding:26px 18px;display:flex;flex-direction:column;gap:4px;
  overflow-y:auto;z-index:20;
}
.brand{padding:4px 10px 22px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:14px}
.brand .mark{font-family:"Fraunces",serif;font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold-soft);font-weight:600}
.brand h1{font-size:25px;color:#fff;margin-top:6px;font-weight:500}
.brand p{font-size:12px;color:rgba(233,236,223,.6);margin-top:5px}
.nav-group{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(205,176,116,.7);padding:16px 10px 6px;font-weight:700}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;
  color:rgba(233,236,223,.82);font-size:13.5px;font-weight:500;width:100%;text-align:left;
  transition:background .15s,color .15s;
}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(255,255,255,.13);color:#fff;font-weight:600}
.nav-item .ic{width:17px;height:17px;flex:none;opacity:.9}
.nav-item .num{margin-left:auto;font-size:10px;opacity:.45;font-variant-numeric:tabular-nums}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:15;backdrop-filter:blur(10px);
  background:var(--topbar-bg);border-bottom:1px solid var(--line);
  padding:16px 38px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.topbar .crumb{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700}
.topbar h2{font-size:22px;margin-top:1px}
.topbar .right{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:600;background:var(--surface);border:1px solid var(--line);color:var(--ink-soft)}
.pill b{color:var(--ink)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:11px;font-size:13px;font-weight:600;background:var(--blue);color:#fff;transition:transform .1s,filter .15s}
.btn:hover{filter:brightness(1.08)}.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--surface);color:var(--ink-soft);border:1px solid var(--line)}
.btn.ghost:hover{filter:none;border-color:var(--gold-soft)}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:9px}

.content{padding:30px 38px 70px;max-width:1180px;width:100%}
.view{display:none;animation:fade .45s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.perfil-switch{display:inline-flex;background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:3px}
.perfil-switch button{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--ink-soft);transition:.15s}
.perfil-switch button:hover{color:var(--ink)}
.perfil-switch button.active{background:#fff;box-shadow:var(--shadow);color:var(--ink)}
.perfil-switch .dot{width:9px;height:9px}
.banner{display:flex;align-items:center;gap:11px;background:var(--surface2);border:1px dashed var(--line);border-radius:13px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--ink-soft)}
.banner b{color:var(--ink)}
.banner svg{flex:none;color:var(--gold)}
.menu-toggle{display:none}

/* ---------- CARDS / GRID ---------- */
.grid{display:grid;gap:18px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
.card.tight{padding:18px}
.card-h{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.card-h h3{font-size:18px}
.card-h .tag{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.section-intro{margin-bottom:24px;max-width:760px}
.section-intro h2{font-size:30px;margin-bottom:8px}
.section-intro p{color:var(--ink-soft);font-size:14.5px}

/* KPI */
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .lbl{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}
.kpi .val{font-family:"Fraunces",serif;font-size:30px;margin-top:8px;font-variant-numeric:tabular-nums;line-height:1;overflow-wrap:break-word;min-width:0}
.kpi .sub{font-size:12.5px;color:var(--ink-soft);margin-top:7px}
.kpi .corner{position:absolute;top:14px;right:16px;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--surface2)}
.kpi.accent{background:linear-gradient(160deg,var(--blue),var(--blue-d));color:#fff;border:none}
.kpi.accent .lbl{color:var(--gold-soft)}.kpi.accent .sub{color:rgba(255,255,255,.7)}
.kpi.accent .corner{background:rgba(255,255,255,.12)}

.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11.5px;font-weight:700}
.chip.exc{background:var(--pos-bg);color:var(--positive)}
.chip.boa{background:#e3ecf7;color:var(--blue)}
.chip.aten{background:var(--warn-bg);color:var(--warning)}
.chip.crit{background:var(--crit-bg);color:var(--critical)}
.up{color:var(--positive)}.down{color:var(--critical)}

/* progress */
.bar{height:9px;border-radius:99px;background:var(--line-soft);overflow:hidden}
.bar > span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--gold));transition:width .6s cubic-bezier(.2,.8,.2,1)}
.bar.gold>span{background:linear-gradient(90deg,var(--gold),var(--gold-soft))}
.bar.crit>span{background:linear-gradient(90deg,var(--critical),#d8775f)}

/* table */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:0 12px 10px}
td{padding:11px 12px;border-top:1px solid var(--line-soft);font-size:13.5px;vertical-align:middle}
tr:hover td{background:var(--surface2)}
.num-cell{font-variant-numeric:tabular-nums;text-align:right;font-weight:600}
.who{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:12.5px}
.dot{width:9px;height:9px;border-radius:99px;flex:none}
.dot.r{background:var(--blue)}.dot.e{background:var(--gold)}.dot.c{background:#7d8a82}

/* forms */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.field input,.field select{padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--ink);width:100%}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(31,87,147,.15)}
.form-row{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));align-items:end}

.icon-btn{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--muted);transition:.15s}
.icon-btn:hover{background:var(--crit-bg);color:var(--critical)}

/* alerts */
.alert{display:flex;gap:13px;padding:15px 17px;border-radius:14px;border:1px solid;margin-bottom:11px;align-items:flex-start}
.alert .ai{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center}
.alert.crit{background:var(--crit-bg);border-color:#ecc6bd}.alert.crit .ai{background:#eab9ac;color:var(--critical)}
.alert.aten{background:var(--warn-bg);border-color:#ecd9aa}.alert.aten .ai{background:#e8cf91;color:var(--warning)}
.alert.pos{background:var(--pos-bg);border-color:#bcd9c5}.alert.pos .ai{background:#aed0ba;color:var(--positive)}
.alert h4{font-family:"Manrope";font-size:14px;font-weight:700;margin-bottom:2px}
.alert p{font-size:13px;color:var(--ink-soft)}

/* donut */
.donut-wrap{display:flex;align-items:center;gap:26px;flex-wrap:wrap}
.legend{display:flex;flex-direction:column;gap:11px;flex:1;min-width:170px}
.legend-row{display:flex;align-items:center;gap:10px;font-size:13.5px}
.legend-row .sw{width:13px;height:13px;border-radius:4px;flex:none}
.legend-row .lp{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums}

.scenario-tabs{display:inline-flex;background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:3px}
.scenario-tabs button{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;color:var(--ink-soft)}
.scenario-tabs button.active{background:var(--blue);color:#fff}

.rule{display:flex;gap:12px;padding:14px 16px;border-radius:13px;background:var(--surface2);border:1px solid var(--line-soft);align-items:center}
.rule .n{font-family:"Fraunces",serif;font-size:20px;color:var(--gold);flex:none;width:30px}
.rule p{font-size:13.5px;font-weight:500}

.stat-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line-soft);font-size:13.5px}
.stat-line:last-child{border:none}
.stat-line b{font-variant-numeric:tabular-nums}

.gauge{position:relative;width:200px;height:120px;margin:0 auto}
.disclaimer{font-size:12px;color:var(--muted);background:var(--surface2);border:1px dashed var(--line);border-radius:12px;padding:13px 15px;line-height:1.5}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:13.5px}

.seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.seg button.active{background:var(--blue);color:#fff}

@media(max-width:1024px){
  /* tabelas largas rolam horizontalmente em vez de sobrepor o conteúdo */
  .content table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap}
  .content table .row-desc{white-space:normal}
}
@media(max-width:920px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;width:262px;transform:translateX(-100%);transition:transform .3s;box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:none}
  .menu-toggle{display:grid;place-items:center;width:38px;height:38px;border-radius:10px;background:var(--surface);border:1px solid var(--line)}
  .content,.topbar{padding-left:18px;padding-right:18px}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .scrim{display:none;position:fixed;inset:0;background:rgba(20,61,107,.38);z-index:18}
  .scrim.show{display:block}
  #rendaPill{display:none}
  .perfil-switch button{padding:6px 9px;font-size:11.5px}
  .topbar{gap:10px}
  .topbar .right{gap:8px}
  .grid[style*="grid-template-columns"]{grid-template-columns:1fr !important}
}
@media(min-width:921px){.scrim{display:none}}

/* ---------- DASHBOARD: LEMBRETES / CONTAS / GRÁFICOS ---------- */
.mini-kpi{background:var(--surface2);border:1px solid var(--line-soft);border-radius:13px;padding:13px 15px;text-align:center}
.mini-kpi span{display:block;font-family:"Fraunces",serif;font-size:23px;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums;overflow-wrap:break-word}
.mini-kpi small{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:6px}
.mini-kpi.crit{background:var(--crit-bg);border-color:#ecc6bd}.mini-kpi.crit span{color:var(--critical)}
.mini-kpi.pos{background:var(--pos-bg);border-color:#bcd9c5}.mini-kpi.pos span{color:var(--positive)}
.lemb-list{display:flex;flex-direction:column}
.lemb-row{display:flex;align-items:center;gap:11px;padding:11px 4px;border-top:1px solid var(--line-soft)}
.lemb-row:first-child{border-top:none}
.lemb-info{display:flex;flex-direction:column;min-width:0}
.lemb-info b{font-size:13.5px;font-weight:600}
.lemb-info span{font-size:11.5px;color:var(--ink-soft)}
.cstatus{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:999px;margin-left:4px;vertical-align:middle}
.cstatus.venc{background:var(--crit-bg);color:var(--critical)}
.cstatus.hoje{background:var(--warn-bg);color:var(--warning)}
.cstatus.prox{background:#e3ecf7;color:var(--blue)}
.cstatus.pago{background:var(--pos-bg);color:var(--positive)}
.icon-btn.ok{color:var(--positive);font-size:15px;font-weight:800}
.icon-btn.ok:hover{background:var(--pos-bg);color:var(--positive)}
tr.row-venc td{background:rgba(177,69,54,.05)}
.vsbars{display:flex;align-items:flex-end;gap:14px;height:180px;padding:8px 4px 0}
.vsbar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.vsbar-pair{display:flex;align-items:flex-end;gap:5px;height:100%;width:100%;justify-content:center}
.vsbar{width:34%;max-width:26px;border-radius:6px 6px 0 0;transition:height .5s cubic-bezier(.2,.8,.2,1)}
.vsbar.r{background:linear-gradient(180deg,#3a9168,var(--positive))}
.vsbar.d{background:linear-gradient(180deg,#cf6354,var(--critical))}
.vsbar.s{background:linear-gradient(180deg,#4a8fd6,var(--blue))}
.vsbar.p{background:linear-gradient(180deg,#d8bd83,var(--gold))}
.vsbars3 .vsbar{max-width:16px}
.vsbar-lbl{font-size:11px;color:var(--muted);font-weight:600}
.vsbars-legend{display:flex;gap:18px;justify-content:center;margin-top:12px;font-size:12px;color:var(--ink-soft)}
.vsbars-legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:middle}

/* ---------- VETERINÁRIA (área privada) ---------- */
.vet-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.vet-head h2{font-family:"Fraunces",serif;font-size:26px;margin-top:3px}
.vet-badge{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
.vet-head>button{margin-left:auto}
.vet-tabs{display:flex;flex-wrap:wrap}
.est-actions{display:flex;gap:6px;align-items:center;justify-content:flex-end;flex-wrap:nowrap}
.est-actions input{width:60px;padding:5px 7px;border:1px solid var(--line);border-radius:7px;flex:none}
.est-actions .btn.sm{white-space:nowrap;flex:none}
.vr-linetotal{margin-top:10px;text-align:right;font-size:13.5px;color:var(--ink-soft)}
.vr-linetotal b{color:var(--ink);font-variant-numeric:tabular-nums}
/* fitment geral de formularios: botoes nao encolhem nem sobrepoem */
.form-row .btn{white-space:nowrap;align-self:end;height:fit-content}
.form-row>.field{min-width:0}
.vet-lock{display:flex;justify-content:center;padding:44px 16px}
.vet-lock-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-lg);padding:34px;max-width:380px;width:100%;text-align:center}
.vet-lock-ic{font-size:40px;margin-bottom:10px}
.vet-lock-card h2{font-size:24px;margin-bottom:6px}
.vet-lock-card p{font-size:13.5px;color:var(--ink-soft);margin-bottom:18px}
.vet-lock-card input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:var(--surface2);font-size:15px}
.vet-lock-card input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(31,87,147,.15)}
.vet-err{color:var(--critical);font-size:12.5px;min-height:17px;margin-bottom:8px;font-weight:600}
.vet-forgot{display:block;margin:14px auto 0;font-size:11.5px;color:var(--muted);text-decoration:underline}
.vet-forgot:hover{color:var(--ink-soft)}

/* ---------- NAVEGAÇÃO DE MESES ---------- */
.month-nav{display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px}
.mnav-arrow{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:var(--ink-soft);font-size:18px;line-height:1;transition:.15s;flex:none}
.mnav-arrow:hover{background:var(--surface2);color:var(--blue)}
.mnav-label{font-size:12.5px;font-weight:700;color:var(--ink);min-width:74px;text-align:center;font-variant-numeric:tabular-nums}
.inline-month-nav{display:inline-flex;align-items:center;gap:6px;vertical-align:middle}
.mnav-arrow.sm{width:26px;height:26px;border:1px solid var(--line);background:var(--surface)}
.row-desc{display:block;font-size:11.5px;color:var(--muted);margin-top:2px;font-weight:400}

/* ---------- ATALHO RÁPIDO (FAB) ---------- */
.fab-wrap{position:fixed;right:26px;bottom:26px;z-index:30;display:flex;flex-direction:column;align-items:flex-end;gap:12px}
.fab{width:58px;height:58px;border-radius:50%;background:linear-gradient(160deg,var(--blue),var(--blue-d));color:#fff;font-size:30px;line-height:1;display:grid;place-items:center;box-shadow:var(--shadow-lg);transition:transform .25s,filter .15s}
.fab:hover{filter:brightness(1.1)}
.fab-wrap.open .fab{transform:rotate(45deg)}
.fab-actions{display:flex;flex-direction:column;gap:10px;opacity:0;transform:translateY(10px) scale(.96);pointer-events:none;transition:.2s}
.fab-wrap.open .fab-actions{opacity:1;transform:none;pointer-events:auto}
.fab-action{display:inline-flex;align-items:center;gap:8px;padding:11px 17px;border-radius:13px;font-size:13.5px;font-weight:700;color:#fff;box-shadow:var(--shadow);white-space:nowrap}
.fab-action:active{transform:scale(.96)}
.fab-action.rec{background:var(--positive)}
.fab-action.desp{background:var(--critical)}

/* ---------- MODAL ---------- */
.modal-scrim{display:none;position:fixed;inset:0;background:rgba(20,61,107,.42);backdrop-filter:blur(2px);z-index:40}
.modal-scrim.show{display:block}
.modal{display:none;position:fixed;z-index:41;left:50%;top:50%;transform:translate(-50%,-50%);width:min(440px,calc(100vw - 32px));background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-lg);padding:22px;max-height:calc(100vh - 40px);overflow-y:auto}
.modal.show{display:block;animation:fade .25s ease}
.modal-head{display:flex;align-items:center;margin-bottom:16px}
.modal-head h3{font-size:20px}
.modal-x{margin-left:auto;width:30px;height:30px;border-radius:8px;color:var(--muted);font-size:15px;display:grid;place-items:center}
.modal-x:hover{background:var(--surface2);color:var(--ink)}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.qseg{display:flex;width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:3px;margin-bottom:14px}
.qseg button{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:700;color:var(--ink-soft);transition:.15s}
.qseg button.active{background:#fff;box-shadow:var(--shadow);color:var(--ink)}
.qseg.sub{margin-bottom:0}
.qseg.sub button.active{background:var(--blue);color:#fff}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark">Patrimônio · Família</div>
      <h1>Rodrigo &amp; Esther</h1>
      <p>Manual de Gestão Financeira e Investimentos</p>
    </div>
    <nav id="nav"></nav>
  </aside>
  <div class="scrim" id="scrim"></div>

  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div>
        <div class="crumb" id="crumb">Diagnóstico</div>

        <span class="pill" id="rendaPill">Renda · <b id="topRenda">R$ 0</b></span>

</div>

<!-- Atalho rápido para lançar receita / despesa -->
<div class="fab-wrap" id="fabWrap">
  <div class="fab-actions" id="fabActions">
    <button class="fab-action rec" data-quick="rec">＋ Receita</button>
    <button class="fab-action desp" data-quick="desp">＋ Despesa</button>
  </div>
  <button class="fab" id="fabMain" aria-label="Lançamento rápido" title="Lançamento rápido">＋</button>
</div>
<div class="modal-scrim" id="modalScrim"></div>
<div class="modal" id="quickModal" role="dialog" aria-modal="true"></div>

<script>
/* ============================ HELPERS ============================ */
const $ = s => document.querySelector(s);
const BRL = n => 'R$ ' + Math.round(n||0).toLocaleString('pt-BR');
const BRLk = n => 'R$ ' + (n||0).toLocaleString('pt-BR',{maximumFractionDigits:0});
const PCT = (n,d=1) => (n||0).toLocaleString('pt-BR',{maximumFractionDigits:d})+'%';
const uid = () => Math.random().toString(36).slice(2,9);
const MNAMES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const mLabel = k => { const [y,m]=k.split('-'); return MNAMES[+m-1]+'/'+y; };
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function shiftMonth(key,delta){ let [y,m]=key.split('-').map(Number); m+=delta; while(m<1){m+=12;y--;} while(m>12){m-=12;y++;} return y+'-'+String(m).padStart(2,'0'); }
const PAL=['#1f5793','#b08a3e','#7d8a82','#cdb074','#2f7a52','#b14536','#143d6b','#a9b3c2'];

/* ---------- DATAS / CONTAS ---------- */
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtData(iso){ if(!iso)return''; const [y,m,d]=iso.split('-'); return d+'/'+m+'/'+y; }
function diasAte(iso){ const t=new Date(todayISO()+'T00:00'), v=new Date(iso+'T00:00'); return Math.round((v-t)/86400000); }
function contasPend(tipo){ return S.contas.filter(c=>!c.pago&&(!tipo||c.tipo===tipo)).sort((a,b)=>a.venc.localeCompare(b.venc)); }
function contasHoje(tipo){ const h=todayISO(); return contasPend(tipo).filter(c=>c.venc===h); }
function contasVencidas(tipo){ const h=todayISO(); return contasPend(tipo).filter(c=>c.venc<h); }
function contasProximas(dias,tipo){ const h=todayISO(); return contasPend(tipo).filter(c=>c.venc>h&&diasAte(c.venc)<=dias); }
function somaContas(arr){ return arr.reduce((a,c)=>a+(+c.valor||0),0); }

/* Categorias (fonte única usada nos formulários e no atalho rápido) */
const CATS = {
  rec:{
    rodrigo:['Pró-labore','Distribuição de lucros','Comissões','Rendas extras'],
    esther:['Consultas','Vacinação','Cirurgias','Procedimentos','Serviços extras']
  },
  desp:{
    rodrigo:['Gastos pessoais','Carro','Combustível','Lazer','Assinaturas','Alimentação'],
    esther:['Gastos pessoais','Transporte','Alimentação','Compras pessoais','Assinaturas'],
    casal:['Moradia','Energia','Internet','Água','Mercado','Farmácia','Pets','Saúde','Viagens','Restaurantes','Presentes','Imprevistos']
  }
};

/* ============================ SEED / STATE ============================ */
function seedVet(){ return {pin:null,receitas:[],despesas:[],contas:[],catalogo:[],estoque:[],config:{margemAlvo:30,formasPagamento:['Dinheiro','Pix','Cartão de débito','Cartão de crédito','Transferência']}}; }
function seed(){
  const now=new Date();
  const cm=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  return {
    profile:{rodrigo:{nome:'Rodrigo Machado',idade:32,prolabore:0},esther:{nome:'Esther Maggessi',idade:29,renda:0}},
    patrimonio:{investido:0,conta:0,dividas:0},
    saldos:{rodrigo:0,esther:0,casal:0},
    receitas:[], despesas:[], contas:[],
    metas:[],
    viagens:[],
    qualidade:{Lazer:0,Restaurantes:0,Passeios:0,Academia:0,'Saúde / bem-estar':0,'Desenvolvimento pessoal':0},
    invest:{taxaAnual:11,dyMedio:9,alocacao:{rf:50,fii:20,acoes:20,oport:10}},
    reservaMeta:6,
    vet:seedVet(),
    config:{mesAtual:cm}
  };
}
const KEY='manual_fin_rodrigo_esther_v2';
/* migrate apenas COMPLETA campos faltantes — nunca apaga dados já existentes */
function migrate(st){
  if(!st || typeof st!=='object') st=seed();
  const now=new Date(), cm=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  if(!st.config) st.config={mesAtual:cm};
  if(!st.config.theme) st.config.theme='light';
  if(!st.profile) st.profile=seed().profile;
  if(!st.patrimonio) st.patrimonio={investido:0,conta:0,dividas:0};
  if(!Array.isArray(st.receitas)) st.receitas=[];
  if(!Array.isArray(st.despesas)) st.despesas=[];
  if(!Array.isArray(st.metas)) st.metas=[];
  if(!Array.isArray(st.viagens)) st.viagens=[];
  if(!st.qualidade) st.qualidade=seed().qualidade;
  if(!st.invest) st.invest=seed().invest;
  if(!st.contas) st.contas=[];
  if(!st.saldos) st.saldos={rodrigo:0,esther:0,casal:0};
  if(!st.vet) st.vet=seedVet();
  if(!st.vet.config) st.vet.config={margemAlvo:30};
  if(!Array.isArray(st.vet.config.formasPagamento)) st.vet.config.formasPagamento=['Dinheiro','Pix','Cartão de débito','Cartão de crédito','Transferência'];
  ['receitas','despesas','contas','catalogo','estoque'].forEach(k=>{ if(!Array.isArray(st.vet[k])) st.vet[k]=[]; });
  return st;
}
let S;
try{ S = JSON.parse(localStorage.getItem(KEY)) || seed(); }catch(e){ S = seed(); }
S = migrate(S);
function save(){ try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){} }
function reset(){
  const pin=prompt('Para LIMPAR todos os dados, digite a senha de limpeza:');
  if(pin===null) return;
  if(pin.trim()!=='97110606'){ alert('Senha incorreta. Nenhum dado foi apagado.'); return; }
  if(confirm('Senha correta. Apagar TODAS as informações e recomeçar do zero? Esta ação não pode ser desfeita.')){ const t=S.config.theme; S=seed(); S.config.theme=t; vetAuth=false; vetTab='painel'; save(); applyTheme(); render(); }
}
/* ---------- TEMA (claro/escuro) ---------- */
function applyTheme(){ const dark=S.config.theme==='dark'; document.documentElement.dataset.theme=dark?'dark':'light'; const b=document.getElementById('themeBtn'); if(b)b.textContent=dark?'☀️':'🌙'; }
/* ---------- BACKUP (exportar / importar) ---------- */
function exportBackup(){
  try{
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='financeiro-backup-'+todayISO()+'.json'; document.body.appendChild(a); a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100);
  }catch(e){ alert('Não foi possível gerar o backup.'); }
}
function importBackup(file){
  const fr=new FileReader();
  fr.onload=()=>{ try{ const data=JSON.parse(fr.result); if(!data||typeof data!=='object') throw 0;
    if(confirm('Restaurar este backup? Os dados atuais serão SUBSTITUÍDOS pelos do arquivo.')){ S=migrate(data); vetAuth=false; save(); applyTheme(); render(); alert('Backup restaurado com sucesso!'); }
  }catch(e){ alert('Arquivo de backup inválido.'); } };
  fr.readAsText(file);
}

/* ============================ CÁLCULOS ============================ */
function months(){ return [...new Set([...S.receitas,...S.despesas].map(x=>x.mes))].sort(); }
function curMonth(){ return S.config.mesAtual; }
function recMes(m){ return S.receitas.filter(r=>r.mes===m).reduce((a,b)=>a+b.valor,0); }
function despMes(m,dono){ return S.despesas.filter(d=>d.mes===m&&(!dono||d.dono===dono)).reduce((a,b)=>a+b.valor,0); }
function recPessoaMes(m,p){ return S.receitas.filter(r=>r.mes===m&&r.pessoa===p).reduce((a,b)=>a+b.valor,0); }
function mediaDespesa(){ const ms=months(); if(!ms.length)return 0; return ms.reduce((a,m)=>a+despMes(m),0)/ms.length; }
function patrimonioLiq(){ return S.patrimonio.investido + S.patrimonio.conta - S.patrimonio.dividas; }
function taxaPoupanca(m){ const r=recMes(m); return r? (r-despMes(m))/r : 0; }
function sobraMes(m){ return recMes(m)-despMes(m); }

/* ---- perfil individual / casal ---- */
function perfil(){ return S.config.perfil || 'casal'; }
function pNome(p){ return p==='rodrigo'?(S.profile.rodrigo.nome.split(' ')[0]):p==='esther'?(S.profile.esther.nome.split(' ')[0]):'Casal'; }
function rateio(){ return S.config.rateio || 'igual'; }
function shareCasal(m,p){ const tot=despMes(m,'casal'); if(rateio()==='renda'){ const rc=recMes(m); return rc>0?tot*(recPessoaMes(m,p)/rc):tot/2; } return tot/2; }
function despIndiv(m,p){ return despMes(m,p)+shareCasal(m,p); }
function sobraIndiv(m,p){ return recPessoaMes(m,p)-despIndiv(m,p); }
function txPoupIndiv(m,p){ const r=recPessoaMes(m,p); return r? sobraIndiv(m,p)/r : 0; }
function healthScoreIndiv(p){
  const m=curMonth(), tx=txPoupIndiv(m,p), ms=months(), prev=ms.filter(x=>x<m);
  const cPoup=clamp(tx/0.20,0,1)*50;
  const atualPess=despMes(m,p), histPess=prev.map(pm=>despMes(pm,p)).filter(x=>x>0);
  let cDisc=15;
  if(histPess.length){ const avg=histPess.reduce((a,b)=>a+b,0)/histPess.length; const ratio=avg>0?atualPess/avg:1; cDisc=clamp(30*(1.15-ratio)/0.30,0,30); }
  const r=recPessoaMes(m,p), sob=sobraIndiv(m,p);
  const cContrib = sob>=0?20:clamp(20*(1+sob/(r||1)),0,20);
  const total=Math.round(cPoup+cDisc+cContrib);
  return {total,tx,comp:{'Poupança':cPoup,'Disciplina de gastos':cDisc,'Contribuição':cContrib}};
}

function fvAporte(pmt, annualPct, years, principal=0){
  const i=Math.pow(1+annualPct/100,1/12)-1, n=years*12;
  const fvP = principal*Math.pow(1+i,n);
  const fvA = i===0? pmt*n : pmt*((Math.pow(1+i,n)-1)/i);
  return fvP+fvA;
}
function dividendosMensais(patrimonio){
  const share=(S.invest.alocacao.fii+S.invest.alocacao.acoes)/100;
  return patrimonio*share*(S.invest.dyMedio/100)/12;
}

function healthScore(){
  const m=curMonth(); const r=recMes(m); const tx=taxaPoupanca(m);
  const md=mediaDespesa()||1;
  const mesesCob = S.patrimonio.conta/md;
  // componentes
  const cPoup = clamp(tx/0.20,0,1)*25;
  const cReserva = clamp(mesesCob/6,0,1)*25;
  const cInvest = clamp((S.patrimonio.investido/(r*6||1)),0,1)*20;
  const cDivida = S.patrimonio.dividas===0?20:clamp(20*(1-S.patrimonio.dividas/(r*6||1)),0,20);
  const cConsist = (S.patrimonio.investido>0?6:0)+(mesesCob>3?4:mesesCob>1?2:0);
  const total = Math.round(cPoup+cReserva+cInvest+cDivida+cConsist);
  return {total,comp:{Poupança:cPoup,Reserva:cReserva,Investimento:cInvest,Endividamento:cDivida,'Consistência':cConsist},mesesCob,tx};
}
function rating(v){ // v 0-100
  if(v>=80)return{cls:'exc',t:'Excelente'}; if(v>=60)return{cls:'boa',t:'Boa'};
  if(v>=40)return{cls:'aten',t:'Atenção'}; return{cls:'crit',t:'Crítica'};
}

function analisar(pf){
  const ms=months(); if(ms.length<2) return [];
  const cur=curMonth(); const prev=ms.filter(x=>x<cur);
  const alerts=[];
  const donos = pf? [pf,'casal'] : ['rodrigo','esther','casal'];
  donos.forEach(dono=>{
    const cats=[...new Set(S.despesas.filter(d=>d.dono===dono).map(d=>d.cat))];
    cats.forEach(cat=>{
      const atual=S.despesas.filter(d=>d.dono===dono&&d.cat===cat&&d.mes===cur).reduce((a,b)=>a+b.valor,0);
      const hist=prev.map(pm=>S.despesas.filter(d=>d.dono===dono&&d.cat===cat&&d.mes===pm).reduce((a,b)=>a+b.valor,0)).filter(x=>x>0);
      if(!hist.length||!atual)return;
      const avg=hist.reduce((a,b)=>a+b,0)/hist.length;
      const diff=(atual-avg)/avg;
      const nome = dono==='casal'?'O casal':pNome(dono);
      if(diff>=0.25) alerts.push({t:'crit',h:`${cat} acima da média`,p:`${nome} gastou ${PCT(diff*100,0)} acima da média em ${cat.toLowerCase()} este mês (${BRL(atual)} vs. ${BRL(avg)} de média).`});
      else if(diff<=-0.15) alerts.push({t:'pos',h:`Economia em ${cat.toLowerCase()}`,p:`${nome} reduziu ${PCT(Math.abs(diff)*100,0)} dos gastos em ${cat.toLowerCase()} (${BRL(atual)} vs. ${BRL(avg)}).`});
    });
  });
  const tx = pf? txPoupIndiv(cur,pf) : taxaPoupanca(cur);
  const subj = pf? pNome(pf) : 'Vocês', verb = pf? 'poupou' : 'pouparam';
  if(tx<0.10) alerts.push({t:'crit',h:'Taxa de poupança baixa',p:`${subj} ${verb} ${PCT(tx*100,0)} da renda este mês — abaixo do mínimo recomendado de 10%.`});
  else if(tx>=0.20) alerts.push({t:'pos',h:'Excelente taxa de poupança',p:`${subj} ${verb} ${PCT(tx*100,0)} da renda este mês — dentro do cenário agressivo.`});
  if(!pf){
    const md=mediaDespesa(); const cob=S.patrimonio.conta/(md||1);
    if(cob<3&&md>0) alerts.push({t:'aten',h:'Reserva de emergência incompleta',p:`A reserva cobre apenas ${cob.toFixed(1)} meses de despesas. Meta inicial: 6 meses (${BRL(md*6)}).`});
  }
  const order={crit:0,aten:1,pos:2};
  return alerts.sort((a,b)=>order[a.t]-order[b.t]);
}

/* ============================ MICRO CHARTS ============================ */
function donut(segs,size=180,top='CARTEIRA',bottom='100%'){
  const r=62,cx=size/2,cy=size/2,c=2*Math.PI*r; let off=0,parts='';
  segs.forEach(s=>{ const len=c*s.pct/100;
    parts+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="22" stroke-linecap="round" stroke-dasharray="${len-3} ${c-len+3}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`; off+=len; });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${parts}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-family="Fraunces" font-size="13" fill="var(--muted)" letter-spacing="1">${top}</text>
    <text x="${cx}" y="${cy+18}" text-anchor="middle" font-family="Fraunces" font-size="${bottom.length>7?15:20}" fill="var(--ink)">${bottom}</text></svg>`;
}
/* barras comparativas receitas x despesas por mês */
function vsBars(){
  const ms=months().slice(-6);
  if(!ms.length) return '<div class="empty">Lance receitas e despesas para ver o comparativo mensal.</div>';
  const data=ms.map(m=>({m,r:recMes(m),d:despMes(m)}));
  const max=Math.max(...data.flatMap(x=>[x.r,x.d]),1);
  return `<div class="vsbars">${data.map(x=>`<div class="vsbar-col">
      <div class="vsbar-pair">
        <span class="vsbar r" style="height:${Math.max(x.r/max*100,x.r?3:0)}%" title="Receitas ${BRL(x.r)}"></span>
        <span class="vsbar d" style="height:${Math.max(x.d/max*100,x.d?3:0)}%" title="Despesas ${BRL(x.d)}"></span>
      </div><span class="vsbar-lbl">${MNAMES[+x.m.split('-')[1]-1]}</span></div>`).join('')}</div>
    <div class="vsbars-legend"><span><i style="background:var(--positive)"></i>Receitas</span><span><i style="background:var(--critical)"></i>Despesas</span></div>`;
}
function despPorCat(m){ const o={}; S.despesas.filter(d=>d.mes===m).forEach(d=>o[d.cat]=(o[d.cat]||0)+d.valor); return Object.entries(o).sort((a,b)=>b[1]-a[1]); }
function line(vals,w=560,h=120){
  if(vals.length<2)return'';
  const max=Math.max(...vals)*1.1,min=Math.min(...vals,0);
  const X=i=>20+i*(w-40)/(vals.length-1), Y=v=>h-18-((v-min)/(max-min||1))*(h-34);
  const pts=vals.map((v,i)=>`${X(i)},${Y(v)}`).join(' ');
  const area=`20,${h-18} `+pts+` ${X(vals.length-1)},${h-18}`;
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1f5793" stop-opacity=".22"/><stop offset="1" stop-color="#1f5793" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#lg)"/>
    <polyline points="${pts}" fill="none" stroke="#1f5793" stroke-width="2.5" stroke-linejoin="round"/>
    ${vals.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="3.5" fill="#fbfaf5" stroke="#b08a3e" stroke-width="2"/>`).join('')}
  </svg>`;
}
function hbars(items){ const max=Math.max(...items.map(i=>i.v),1);
  return items.map(i=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${i.l}</span><b style="font-variant-numeric:tabular-nums">${BRL(i.v)}</b></div><div class="bar"><span style="width:${i.v/max*100}%;background:${i.c||'linear-gradient(90deg,var(--blue),var(--gold))'}"></span></div></div>`).join('');
}

/* ============================ CONTAS / LEMBRETES ============================ */
function vContas(){
  const aPagar=contasPend('pagar'), aReceber=contasPend('receber'), venc=contasVencidas();
  const pagas=S.contas.filter(c=>c.pago).sort((a,b)=>b.venc.localeCompare(a.venc));

    return `<div class="lemb-row"><span class="dot" style="background:${c.tipo==='pagar'?'var(--critical)':'var(--positive)'}"></span>
      <div class="lemb-info"><b>${esc(c.desc||c.cat||'(sem descrição)')}</b><span>${c.tipo==='pagar'?'Pagar':'Receber'} · vence ${fmtData(c.venc)} ${tag}</span></div>

  </div>`;

function pedirLembrete(){
  if(!('Notification'in window)){alert('Seu navegador não suporta notificações.');return;}
  Notification.requestPermission().then(p=>{ if(p==='granted') dispararLembretes(true); render(); });
}
function dispararLembretes(force){
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  const lista=[...contasVencidas(),...contasHoje()];
  if(!lista.length)return;
  const k='lembrete_'+todayISO();
  if(!force&&sessionStorage.getItem(k))return; sessionStorage.setItem(k,'1');
  lista.slice(0,6).forEach(c=>{ try{ new Notification(c.tipo==='pagar'?'💸 Conta a pagar':'💰 Conta a receber',{body:`${c.desc||c.cat||''} — ${BRL(c.valor)} · vence ${fmtData(c.venc)}`}); }catch(e){} });
}

function vAnalise(){
  const pf=perfil(), m=curMonth();
  const al=analisar(pf==='casal'?null:pf);
  const catTot={};
  const filt = pf==='casal'? d=>d.mes===m : d=>d.mes===m&&(d.dono===pf||d.dono==='casal');
  S.despesas.filter(filt).forEach(d=>{const k=(pf!=='casal'&&d.dono==='casal'?'(casal) ':'')+d.cat;catTot[k]=(catTot[k]||0)+d.valor;});

  return `

/* ============================ VETERINÁRIA (módulo privado da Esther) ============================ */
let vetAuth=false, vetTab='painel', vetEditItem=null, vetCatFiltro='';
let vetCart={data:'',tutor:'',desc:'',desconto:0,pagamento:'',itens:[]};
/* separa o custo de um atendimento entre serviços e produtos */
function recCustoSplit(r){ let serv=0,prod=0;
  if(r.itens&&r.itens.length){ r.itens.forEach(it=>{ const tipo=it.tipo||(it.itemId&&vetItem(it.itemId)?vetItem(it.itemId).tipo:'servico')||'servico'; const cc=(+it.custoUnit||0)*(+it.qtd||1); if(tipo==='produto')prod+=cc; else serv+=cc; }); }
  else { const tipo=(r.itemId&&vetItem(r.itemId)?vetItem(r.itemId).tipo:'servico')||'servico'; if(tipo==='produto')prod+=(+r.custo||0); else serv+=(+r.custo||0); }
  return {serv,prod};
}
function vetHash(str){ let h=5381; for(let i=0;i<str.length;i++){ h=((h<<5)+h+str.charCodeAt(i))>>>0; } return 'v'+h.toString(36); }
const VET_CATS_REC=['Consulta domiciliar','Vacinação','Exames','Procedimento','Retorno','Banho/Tosa','Outros'];
const VET_CATS_DESP=['Combustível/Deslocamento','Medicamentos','Insumos/Materiais','Equipamentos','Marketing','Telefone/Internet','Impostos','Outros'];
function vetRecMes(m){ return S.vet.receitas.filter(r=>r.data.slice(0,7)===m); }
function vetDespMes(m){ return S.vet.despesas.filter(d=>d.data.slice(0,7)===m); }
function vetSum(arr){ return arr.reduce((a,x)=>a+(+x.valor||0),0); }
function recLiq(r){ return (+r.valor||0)-(+r.desconto||0); }
function despLiq(d){ return (+d.valor||0)-(+d.desconto||0); }
function vetContasPend(){ return S.vet.contas.filter(c=>!c.pago).sort((a,b)=>a.venc.localeCompare(b.venc)); }
function vetMeses(){ return [...new Set([...S.vet.receitas.map(r=>r.data.slice(0,7)),...S.vet.despesas.map(d=>d.data.slice(0,7))])].sort(); }
/* catálogo e estoque */
function vetItem(id){ return S.vet.catalogo.find(x=>x.id===id); }
function vetMat(id){ return S.vet.estoque.find(x=>x.id===id); }
function vetItemCusto(item){ if(!item)return 0; let c=+item.custoManual||0; (item.materiais||[]).forEach(mm=>{ const e=vetMat(mm.estoqueId); if(e) c+=(+e.custoUnit||0)*(+mm.qtd||0); }); return c; }
function vetItemMargem(item){ const p=+item.preco||0, c=vetItemCusto(item); return p?(p-c)/p*100:0; }
function vetEstoqueBaixo(){ return S.vet.estoque.filter(e=>(+e.qtd||0)<=(+e.qtdMin||0)); }
function vetMetrics(m){
  const rec=vetRecMes(m), desp=vetDespMes(m);
  const fat=rec.reduce((a,r)=>a+recLiq(r),0);
  const custoServ=rec.reduce((a,r)=>a+(+r.custo||0),0);
  const despFixo=desp.filter(d=>d.tipo==='fixo').reduce((a,d)=>a+despLiq(d),0);
  const despVar=desp.filter(d=>d.tipo!=='fixo').reduce((a,d)=>a+despLiq(d),0);
  const fixo=despFixo, variavel=despVar+custoServ, custo=fixo+variavel;
  const lucro=fat-custo, margem=fat?lucro/fat*100:0, n=rec.length, ticket=n?fat/n:0;
  const descConc=rec.reduce((a,r)=>a+(+r.desconto||0),0), descObt=desp.reduce((a,d)=>a+(+d.desconto||0),0);
  const breakeven=(fat>variavel&&fixo>0)? fixo/(1-(variavel/fat)) : 0;
  return {rec,desp,fat,custoServ,custo,fixo,variavel,lucro,margem,n,ticket,descConc,descObt,breakeven};
}

  const head=`<div class="vet-head"><div><div class="vet-badge">🐾 Espaço Veterinário · Esther</div><h2>Atendimentos em domicílio</h2></div>
    <button class="btn ghost sm" data-vet-lock>🔒 Bloquear</button></div>
    <div class="scenario-tabs vet-tabs">${tabs.map(([k,l])=>`<button class="${vetTab===k?'active':''}" data-vet-tab="${k}">${l}</button>`).join('')}</div>`;
  let body = vetTab==='receitas'?vetReceitas(m) : vetTab==='despesas'?vetDespesas(m) : vetTab==='catalogo'?vetCatalogo() : vetTab==='estoque'?vetEstoque() : vetTab==='contas'?vetContasView() : vetTab==='analise'?vetAnalise(m) : vetPainel(m);
  return `<div class="vet-wrap">${head}${body}</div>`;
}

function vetBars(){
  const ms=vetMeses().slice(-6);
  if(!ms.length) return '<div class="empty">Lance atendimentos e custos para ver o comparativo.</div>';
  const data=ms.map(m=>{const k=vetMetrics(m);return {m,r:k.fat,d:k.custo};});
  const max=Math.max(...data.flatMap(x=>[x.r,x.d]),1);
  return `<div class="vsbars">${data.map(x=>`<div class="vsbar-col"><div class="vsbar-pair"><span class="vsbar r" style="height:${Math.max(x.r/max*100,x.r?3:0)}%" title="Receita ${BRL(x.r)}"></span><span class="vsbar d" style="height:${Math.max(x.d/max*100,x.d?3:0)}%" title="Custo ${BRL(x.d)}"></span></div><span class="vsbar-lbl">${MNAMES[+x.m.split('-')[1]-1]}</span></div>`).join('')}</div>
    <div class="vsbars-legend"><span><i style="background:var(--positive)"></i>Receita</span><span><i style="background:var(--critical)"></i>Custo</span></div>`;
}
function vetBarsSplit(){
  const ms=vetMeses().slice(-6);
  if(!ms.length) return '<div class="empty">Lance atendimentos para ver receita × custo de serviços × custo de produtos.</div>';
  const data=ms.map(m=>{ let fat=0,serv=0,prod=0; vetRecMes(m).forEach(r=>{ fat+=recLiq(r); const s=recCustoSplit(r); serv+=s.serv; prod+=s.prod; }); return {m,fat,serv,prod}; });
  const max=Math.max(...data.flatMap(x=>[x.fat,x.serv,x.prod]),1);
  return `<div class="vsbars vsbars3">${data.map(x=>`<div class="vsbar-col"><div class="vsbar-pair">
      <span class="vsbar r" style="height:${Math.max(x.fat/max*100,x.fat?3:0)}%" title="Receita ${BRL(x.fat)}"></span>
      <span class="vsbar s" style="height:${Math.max(x.serv/max*100,x.serv?3:0)}%" title="Custo serviços ${BRL(x.serv)}"></span>
      <span class="vsbar p" style="height:${Math.max(x.prod/max*100,x.prod?3:0)}%" title="Custo produtos ${BRL(x.prod)}"></span>
    </div><span class="vsbar-lbl">${MNAMES[+x.m.split('-')[1]-1]}</span></div>`).join('')}</div>
    <div class="vsbars-legend"><span><i style="background:var(--positive)"></i>Receita</span><span><i style="background:var(--blue)"></i>Custo serviços</span><span><i style="background:var(--gold)"></i>Custo produtos</span></div>`;
}

        <button class="btn sm" data-vet-add-mat="${it.id}">Vincular</button></div>`:'<p style="font-size:12px;color:var(--muted);margin-top:8px">Cadastre materiais na aba <b>Estoque</b> para vincular.</p>'}
    </div>`; };
  const custoServ=cat.filter(it=>it.tipo!=='produto').reduce((a,it)=>a+vetItemCusto(it),0);
  const custoProd=cat.filter(it=>it.tipo==='produto').reduce((a,it)=>a+vetItemCusto(it),0);
  const filtrados=vetCatFiltro?cat.filter(it=>it.tipo===vetCatFiltro):cat;
  const fseg=[['','Todos'],['servico','Serviços'],['produto','Produtos']];
  return `
  <div class="card" style="margin:18px 0"><div class="card-h"><h3>Novo produto ou serviço</h3></div>
    <div class="form-row">
      <div class="field"><label>Tipo</label><select id="vi-tipo"><option value="servico">Serviço</option><option value="produto">Produto</option></select></div>
      <div class="field"><label>Nome</label><input type="text" id="vi-nome" placeholder="Ex.: Consulta domiciliar"></div>
      <div class="field" style="min-width:180px"><label>Descrição</label><input type="text" id="vi-desc" placeholder="Opcional"></div>
      <div class="field"><label>Custo manual R$</label><input type="number" id="vi-custo" placeholder="0" title="Custos fixos do serviço fora do estoque (mão de obra, deslocamento...)"></div>
      <div class="field"><label>Valor de venda R$</label><input type="number" id="vi-preco" placeholder="0"></div>
      <button class="btn" data-vet-add-item>Cadastrar</button></div>
    <p style="font-size:12px;color:var(--muted);margin-top:10px">O <b>custo total</b> = custo manual + soma dos materiais vinculados (puxados do estoque). A <b>margem</b> é calculada automaticamente.</p></div>
  <div class="card" style="margin-bottom:18px"><div class="card-h"><h3>Filtrar custos</h3>
      <span class="seg" style="margin-left:auto">${fseg.map(([k,l])=>`<button class="${vetCatFiltro===k?'active':''}" data-vet-cat-filtro="${k}">${l}</button>`).join('')}</span></div>
    <div class="grid g3">
      <div class="mini-kpi"><span>${BRL(custoServ)}</span><small>Custo unit. de serviços</small></div>
      <div class="mini-kpi"><span>${BRL(custoProd)}</span><small>Custo unit. de produtos</small></div>
      <div class="mini-kpi"><span>${filtrados.length}</span><small>Itens ${vetCatFiltro?(vetCatFiltro==='servico'?'(serviços)':'(produtos)'):'no total'}</small></div>
    </div></div>
  ${filtrados.length?filtrados.map(card).join(''):'<div class="empty">Nenhum item para este filtro.</div>'}`;
}

/* ---- ESTOQUE: vacinas e materiais ---- */
function vetEstoque(){
  const est=S.vet.estoque;
  const totalVal=est.reduce((a,e)=>a+(+e.qtd||0)*(+e.custoUnit||0),0);
  const linha=e=>{ const baixo=(+e.qtd||0)<=(+e.qtdMin||0);
    return `<tr class="${baixo?'row-venc':''}"><td>${esc(e.nome)}${baixo?' <span class="cstatus venc">baixo</span>':''}</td><td>${esc(e.tipo||'—')}</td><td class="num-cell">${e.qtd} ${esc(e.unidade||'un')}</td><td class="num-cell">${e.qtdMin||0}</td><td class="num-cell">${BRL(e.custoUnit||0)}</td><td class="num-cell">${BRL((+e.qtd||0)*(+e.custoUnit||0))}</td>
      <td><div class="est-actions"><input type="number" step="0.01" data-vet-rep-qtd="${e.id}" placeholder="qtd"><button class="btn sm" data-vet-repor="${e.id}" title="Adicionar ao estoque">+ Repor</button>
      <button class="icon-btn" data-vet-del-mat-est="${e.id}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button></div></td></tr>`; };
  return `
  <div class="grid g3" style="margin:18px 0">
    <div class="kpi accent"><div class="lbl">Valor total em estoque</div><div class="val" style="font-size:26px">${BRL(totalVal)}</div></div>
    <div class="kpi"><div class="lbl">Itens cadastrados</div><div class="val" style="font-size:26px">${est.length}</div></div>
    <div class="kpi"><div class="lbl">Itens com estoque baixo</div><div class="val" style="font-size:26px;color:${vetEstoqueBaixo().length?'var(--critical)':'var(--ink)'}">${vetEstoqueBaixo().length}</div></div>
  </div>
  <div class="card" style="margin-bottom:18px"><div class="card-h"><h3>Estoque de vacinas e materiais</h3><span class="tag">${BRL(totalVal)}</span></div>
    <table><thead><tr><th>Item</th><th>Tipo</th><th class="num-cell">Em estoque</th><th class="num-cell">Mínimo</th><th class="num-cell">Custo un.</th><th class="num-cell">Total</th><th></th></tr></thead>
    <tbody>${est.length?est.map(linha).join(''):'<tr><td colspan="7" class="empty">Nenhum material cadastrado.</td></tr>'}</tbody></table></div>
  <div class="card"><div class="card-h"><h3>Novo material / vacina</h3></div>
    <div class="form-row">
      <div class="field"><label>Nome</label><input type="text" id="ve-nome" placeholder="Ex.: Vacina V10"></div>
      <div class="field"><label>Tipo</label><select id="ve-tipo"><option>Vacina</option><option>Medicamento</option><option>Material</option><option>Insumo</option><option>Outro</option></select></div>
      <div class="field"><label>Unidade</label><input type="text" id="ve-un" placeholder="un, ml, cx" value="un"></div>
      <div class="field"><label>Custo unitário R$</label><input type="number" step="0.01" id="ve-custo" placeholder="0"></div>
      <div class="field"><label>Qtd inicial</label><input type="number" step="0.01" id="ve-qtd" placeholder="0"></div>
      <div class="field"><label>Estoque mínimo</label><input type="number" step="0.01" id="ve-min" placeholder="0"></div>
      <button class="btn" data-vet-add-est>Cadastrar</button></div></div>`;
}
function vetContasView(){
